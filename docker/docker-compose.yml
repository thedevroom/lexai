# LexAI v2 — Local development infrastructure
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: lexai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexai
      POSTGRES_USER: lexai
      POSTGRES_PASSWORD: lexai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexai -d lexai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lexai-network

  redis:
    image: redis:7-alpine
    container_name: lexai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lexai-network

  minio:
    image: minio/minio:latest
    container_name: lexai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lexai_minio
      MINIO_ROOT_PASSWORD: lexai_minio_dev_password
    ports:
      - "9000:9000"   # S3-compatible API (R2 local substitute)
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lexai-network

  # One-shot init: create default bucket for local object storage
  minio-init:
    image: minio/mc:latest
    container_name: lexai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 lexai_minio lexai_minio_dev_password &&
        mc mb --ignore-existing local/lexai-uploads &&
        mc anonymous set download local/lexai-uploads/public || true
      "
    networks:
      - lexai-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  lexai-network:
    driver: bridge
    name: lexai-network