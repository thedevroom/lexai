name: Bug report
description: Report a bug in LexAI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include clear steps to reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. pnpm start
        2. Go to /dashboard
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: main @ abc1234
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web (Next.js)
        - API (Fastify/tRPC)
        - AI / Orchestrator
        - Database
        - Deployment
        - Other
    validations:
      required: true